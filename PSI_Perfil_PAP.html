<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSI — Perfil dos Beneficiários PAP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f5f5f3;color:#1a1a18;padding:16px;}
.dash{max-width:980px;margin:0 auto;}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;background:#fff;border-radius:12px;padding:1rem 1.25rem;border:1px solid #e1e0d9;}
.header h1{font-size:17px;font-weight:700;color:#1a1a18;}
.header p{font-size:12px;color:#888780;margin-top:2px;}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;background:#e6f1fb;color:#185fa5;white-space:nowrap;}
.btn{font-size:12px;padding:6px 14px;border:1px solid #c3c2b7;border-radius:6px;background:#fff;cursor:pointer;font-family:Arial,sans-serif;color:#444;}
.btn:hover{background:#f5f5f3;}
.sync-row{font-size:12px;color:#888780;margin-bottom:1rem;}
.filtro-wrap{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;background:#fff;border-radius:8px;padding:.75rem 1rem;border:1px solid #e1e0d9;flex-wrap:wrap;}
.filtro-wrap label{font-size:12px;color:#888780;white-space:nowrap;font-weight:600;}
.filtro-wrap select{font-size:13px;padding:6px 10px;border:1px solid #c3c2b7;border-radius:6px;background:#fff;color:#1a1a18;font-family:Arial,sans-serif;cursor:pointer;}
.tabs{display:flex;gap:2px;margin-bottom:1.25rem;border-bottom:1px solid #e1e0d9;}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;color:#888780;border:none;border-bottom:2px solid transparent;background:none;font-family:Arial,sans-serif;}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18;font-weight:700;}
.panel{display:none;}.panel.active{display:block;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem;}
.kpi{background:#fff;border-radius:8px;padding:.875rem 1rem;border:1px solid #e1e0d9;}
.kpi-label{font-size:11px;color:#888780;margin-bottom:5px;}
.kpi-value{font-size:20px;font-weight:700;color:#1a1a18;line-height:1.1;}
.kpi-sub{font-size:11px;color:#52514e;margin-top:3px;}
.card{background:#fff;border-radius:12px;padding:1rem 1.25rem;border:1px solid #e1e0d9;margin-bottom:1.25rem;}
.sec{font-size:11px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}
.bar-row{margin-bottom:9px;}
.bar-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;font-size:12px;}
.bar-name{color:#1a1a18;}
.bar-val{color:#888780;font-size:11px;}
.bar-track{width:100%;height:7px;background:#f1efe8;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-right:4px;margin-top:4px;}
.pill-g{background:#eaf3de;color:#3b6d11;}
.pill-a{background:#faeeda;color:#854f0b;}
.muni-card{background:#f9f9f7;border:1px solid #e1e0d9;border-radius:8px;padding:.75rem 1rem;margin-bottom:8px;}
.muni-title{font-size:13px;font-weight:700;color:#1a1a18;margin-bottom:3px;}
.muni-ativ{font-size:11px;color:#888780;margin-bottom:8px;}
.muni-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.muni-stat{text-align:center;}
.muni-num{font-size:14px;font-weight:700;color:#1a1a18;}
.muni-lbl{font-size:10px;color:#888780;}
.loading{text-align:center;padding:2rem;color:#888780;font-size:13px;}
.err{text-align:center;padding:1.5rem;color:#a32d2d;font-size:13px;background:#fcebeb;border-radius:8px;line-height:1.6;}
</style>
</head>
<body>
<div class="dash">
  <div class="header">
    <div>
      <h1>PSI — Perfil dos Beneficiários PAP</h1>
      <p>Projetos de Adaptação Produtiva · BR-L1542 · BID/FIDA</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span class="badge">C02 — Agricultura</span>
      <button class="btn" onclick="carregarDados()">↻ Atualizar</button>
    </div>
  </div>

  <div class="sync-row" id="sync-label">⏳ Carregando dados...</div>

  <div class="filtro-wrap" id="filtro-wrap" style="display:none;">
    <label>🔍 Filtrar por lote:</label>
    <select id="lote-select" onchange="aplicarFiltro()">
      <option value="todos">Todos os lotes</option>
    </select>
    <span id="filtro-info" style="font-size:12px;color:#888780;"></span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="aba('geral',this)">📊 Visão geral</button>
    <button class="tab" onclick="aba('muni',this)">📍 Por município</button>
    <button class="tab" onclick="aba('ativ',this)">🌱 Por atividade</button>
  </div>

  <div id="panel-geral" class="panel active"><div class="loading">Carregando...</div></div>
  <div id="panel-muni" class="panel"><div class="loading">Carregando...</div></div>
  <div id="panel-ativ" class="panel"><div class="loading">Carregando...</div></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyYv7Lcjlq6i9tqKgvBfJp5p9SmBYjEN0v4gI4j-P_vUeHOYdWHR2MvyU0biOZPM5a5rQ/exec';
const META_MULHERES = 50;
const META_JOVENS = 20;
const META_PCT = 50;
const META_TOTAL = 9230;

let dadosTodos = [];
let charts = {};

function aba(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  el.classList.add('active');
}

function pct(a, b) { return b > 0 ? (a / b * 100).toFixed(1) + '%' : '0%'; }
function num(v) { return parseFloat(String(v || 0).replace(',', '.').replace(/[^\d.\-]/g, '')) || 0; }

function destruirCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
}

function parsePAP(rows) {
  const dados = [];
  // Pula cabeçalho — procura linha onde col0='LOTE' ou col1='Município'
  let inicio = 0;
  for (let i = 0; i < rows.length; i++) {
    const c0 = String(rows[i][0] || '').trim().toUpperCase();
    const c1 = String(rows[i][1] || '').trim().toUpperCase();
    if (c0 === 'LOTE' || c1 === 'MUNICÍPIO' || c1 === 'MUNICIPIO') {
      inicio = i + 1;
      break;
    }
  }

  for (let i = inicio; i < rows.length; i++) {
    const r = rows[i];
    const lote = String(r[0] || '').trim();
    const muni = String(r[1] || '').trim();
    const ativ = String(r[2] || '').trim();
    const benef = num(r[3]);

    if (!lote || !muni || !ativ || benef <= 0) continue;
    if (lote.toUpperCase().startsWith('TOTAL') || muni.toUpperCase().startsWith('TOTAL')) continue;

    dados.push({
      lote: 'Lote ' + lote,
      municipio: muni,
      atividade: ativ,
      benef: benef,
      mulheres: num(r[4]),
      jovens: num(r[5]),
      quil: num(r[6]),
      valor: num(r[7])
    });
  }
  return dados;
}

function getLotes(dados) {
  const lotes = [...new Set(dados.map(d => d.lote))].filter(Boolean);
  return lotes.sort((a, b) => {
    const na = parseInt(a.replace(/\D/g, ''));
    const nb = parseInt(b.replace(/\D/g, ''));
    return na - nb;
  });
}

function dadosFiltrados() {
  const lote = document.getElementById('lote-select').value;
  if (lote === 'todos') return dadosTodos;
  return dadosTodos.filter(d => d.lote === lote);
}

function soma(arr, campo) { return arr.reduce((s, d) => s + d[campo], 0); }

function aplicarFiltro() {
  const dados = dadosFiltrados();
  const lote = document.getElementById('lote-select').value;
  const info = lote === 'todos'
    ? `${dadosTodos.length} registros`
    : `${dados.length} registros em ${lote}`;
  document.getElementById('filtro-info').textContent = info;
  destruirCharts();
  renderGeral(dados);
  renderMuni(dados);
  renderAtiv(dados);
}

function renderGeral(dados) {
  const total = soma(dados, 'benef');
  const mul = soma(dados, 'mulheres');
  const jov = soma(dados, 'jovens');
  const quil = soma(dados, 'quil');
  const valor = soma(dados, 'valor');
  const pMul = total > 0 ? mul / total * 100 : 0;
  const pJov = total > 0 ? jov / total * 100 : 0;
  const pQuil = total > 0 ? quil / total * 100 : 0;

  const metas = [
    { nome: 'Mulheres', v: mul, p: pMul, meta: META_MULHERES, cor: '#2a78d6' },
    { nome: 'Jovens (15–29)', v: jov, p: pJov, meta: META_JOVENS, cor: '#1baf7a' },
    { nome: 'Quilombolas/PCT', v: quil, p: pQuil, meta: META_PCT, cor: '#eda100' },
  ];

  const lotesCont = getLotes(dadosTodos).map(l => {
    const d = dadosTodos.filter(x => x.lote === l);
    return { lote: l, benef: soma(d, 'benef') };
  });

  document.getElementById('panel-geral').innerHTML = `
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Beneficiários</div><div class="kpi-value">${total.toLocaleString('pt-BR')}</div><div class="kpi-sub">${pct(total, META_TOTAL)} da meta (${META_TOTAL.toLocaleString('pt-BR')})</div></div>
      <div class="kpi"><div class="kpi-label">Mulheres</div><div class="kpi-value" style="color:#2a78d6;">${mul.toLocaleString('pt-BR')}</div><div class="kpi-sub">${pMul.toFixed(1)}% · meta ${META_MULHERES}%</div></div>
      <div class="kpi"><div class="kpi-label">Jovens</div><div class="kpi-value" style="color:#1baf7a;">${jov.toLocaleString('pt-BR')}</div><div class="kpi-sub">${pJov.toFixed(1)}% · meta ${META_JOVENS}%</div></div>
      <div class="kpi"><div class="kpi-label">Quilombolas/PCT</div><div class="kpi-value" style="color:#eda100;">${quil.toLocaleString('pt-BR')}</div><div class="kpi-sub">${pQuil.toFixed(1)}% · meta ${META_PCT}%</div></div>
      <div class="kpi"><div class="kpi-label">Valor estimado</div><div class="kpi-value">R$ ${(valor/1000000).toFixed(1)} mi</div><div class="kpi-sub">R$ 8.250/família</div></div>
    </div>
    <div class="card">
      <p class="sec">Metas transversais PSI</p>
      ${metas.map(m => `
        <div class="bar-row">
          <div class="bar-hd"><span class="bar-name">${m.nome} — ${m.v.toLocaleString('pt-BR')} (${m.p.toFixed(1)}%)</span><span class="bar-val">Meta PSI: ${m.meta}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(m.p, 100).toFixed(0)}%;background:${m.cor};"></div></div>
        </div>`).join('')}
      <div style="margin-top:12px;">
        ${metas.map(m => m.p >= m.meta
          ? `<span class="pill pill-g">✓ ${m.nome} — meta superada</span>`
          : `<span class="pill pill-a">⚠ ${m.nome} — ${m.p.toFixed(1)}% de ${m.meta}%</span>`
        ).join('')}
      </div>
    </div>
    <div class="card">
      <p class="sec">Beneficiários por lote</p>
      <div style="position:relative;height:${Math.max(lotesCont.length * 28 + 60, 200)}px;">
        <canvas id="chart-lotes" role="img" aria-label="Beneficiários por lote">${lotesCont.map(l => l.lote + ': ' + l.benef).join(', ')}</canvas>
      </div>
    </div>`;

  const cores = ['#2a78d6','#1baf7a','#eda100','#e34948','#4a3aa7','#e87ba4','#eb6834','#008300'];
  charts.lotes = new Chart(document.getElementById('chart-lotes'), {
    type: 'bar',
    data: {
      labels: lotesCont.map(l => l.lote),
      datasets: [{ data: lotesCont.map(l => l.benef), backgroundColor: lotesCont.map((_, i) => cores[i % cores.length]), borderRadius: 4, borderSkipped: false }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#888780', font: { size: 11 } } },
        y: { grid: { color: '#e1e0d9' }, ticks: { color: '#888780', font: { size: 10 } } }
      }
    }
  });
}

function renderMuni(dados) {
  const muniMap = {};
  dados.forEach(d => {
    const key = d.lote + '||' + d.municipio;
    if (!muniMap[key]) muniMap[key] = { lote: d.lote, municipio: d.municipio, benef: 0, mulheres: 0, jovens: 0, quil: 0, atividades: [] };
    muniMap[key].benef += d.benef;
    muniMap[key].mulheres += d.mulheres;
    muniMap[key].jovens += d.jovens;
    muniMap[key].quil += d.quil;
    if (!muniMap[key].atividades.includes(d.atividade)) muniMap[key].atividades.push(d.atividade);
  });

  const sorted = Object.values(muniMap).sort((a, b) => b.benef - a.benef);

  const cards = sorted.map(m => `
    <div class="muni-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;">
        <div class="muni-title">${m.municipio}</div>
        <span style="font-size:10px;background:#e6f1fb;color:#185fa5;padding:2px 8px;border-radius:20px;font-weight:700;">${m.lote}</span>
      </div>
      <div class="muni-ativ">🌱 ${m.atividades.join(' · ')}</div>
      <div class="muni-grid">
        <div class="muni-stat"><div class="muni-num">${m.benef}</div><div class="muni-lbl">Beneficiários</div></div>
        <div class="muni-stat"><div class="muni-num" style="color:#2a78d6;">${pct(m.mulheres, m.benef)}</div><div class="muni-lbl">Mulheres</div></div>
        <div class="muni-stat"><div class="muni-num" style="color:#1baf7a;">${pct(m.jovens, m.benef)}</div><div class="muni-lbl">Jovens</div></div>
        <div class="muni-stat"><div class="muni-num" style="color:#eda100;">${pct(m.quil, m.benef)}</div><div class="muni-lbl">Quilombolas</div></div>
      </div>
    </div>`).join('');

  document.getElementById('panel-muni').innerHTML = `
    <div style="font-size:12px;color:#888780;margin-bottom:12px;">${sorted.length} municípios encontrados</div>
    ${cards}`;
}

function renderAtiv(dados) {
  const ativMap = {};
  dados.forEach(d => {
    if (!ativMap[d.atividade]) ativMap[d.atividade] = { benef: 0, mulheres: 0, jovens: 0, quil: 0 };
    ativMap[d.atividade].benef += d.benef;
    ativMap[d.atividade].mulheres += d.mulheres;
    ativMap[d.atividade].jovens += d.jovens;
    ativMap[d.atividade].quil += d.quil;
  });

  const sorted = Object.entries(ativMap).sort((a, b) => b[1].benef - a[1].benef);
  const maxA = sorted[0]?.[1].benef || 1;

  const bars = sorted.map(([nome, v]) => `
    <div class="bar-row">
      <div class="bar-hd"><span class="bar-name">${nome}</span><span class="bar-val">${v.benef} benef. · ${pct(v.mulheres, v.benef)} mulheres</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v.benef / maxA * 100).toFixed(0)}%;background:#2a78d6;"></div></div>
    </div>`).join('');

  document.getElementById('panel-ativ').innerHTML = `
    <div class="card">
      <p class="sec">Beneficiários por atividade econômica</p>
      ${bars}
    </div>
    <div class="card">
      <p class="sec">Distribuição — gráfico</p>
      <div style="position:relative;height:${Math.max(sorted.length * 32 + 60, 200)}px;">
        <canvas id="chart-ativ" role="img" aria-label="Distribuição por atividade">${sorted.map(a => a[0] + ': ' + a[1].benef).join(', ')}</canvas>
      </div>
    </div>`;

  charts.ativ = new Chart(document.getElementById('chart-ativ'), {
    type: 'bar',
    data: {
      labels: sorted.map(a => a[0]),
      datasets: [{ data: sorted.map(a => a[1].benef), backgroundColor: '#2a78d6', borderRadius: 3, borderSkipped: false }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#e1e0d9' }, ticks: { color: '#888780', font: { size: 11 } } },
        y: { grid: { display: false }, ticks: { color: '#888780', font: { size: 11 } } }
      }
    }
  });
}

async function carregarDados() {
  document.getElementById('sync-label').textContent = '⏳ Carregando dados...';
  document.getElementById('filtro-wrap').style.display = 'none';
  ['geral', 'muni', 'ativ'].forEach(id => {
    document.getElementById('panel-' + id).innerHTML = '<div class="loading">Carregando...</div>';
  });
  destruirCharts();
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error(`Erro HTTP ${r.status}`);
    const dados = await r.json();
    const pap = dados['Perfil PAP'];
    if (!pap) throw new Error('Aba "Perfil PAP" não encontrada.');
    dadosTodos = parsePAP(pap);
    if (dadosTodos.length === 0) throw new Error('Nenhum dado encontrado na aba Perfil PAP.');

    // Popular dropdown de lotes
    const lotes = getLotes(dadosTodos);
    const select = document.getElementById('lote-select');
    select.innerHTML = '<option value="todos">Todos os lotes</option>';
    lotes.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l;
      opt.textContent = l;
      select.appendChild(opt);
    });

    document.getElementById('filtro-wrap').style.display = 'flex';
    document.getElementById('filtro-info').textContent = `${dadosTodos.length} registros · ${lotes.length} lotes`;

    renderGeral(dadosTodos);
    renderMuni(dadosTodos);
    renderAtiv(dadosTodos);

    const now = new Date();
    document.getElementById('sync-label').innerHTML =
      `✅ Sincronizado às ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} de ${now.toLocaleDateString('pt-BR')}`;
  } catch(e) {
    ['geral', 'muni', 'ativ'].forEach(id => {
      document.getElementById('panel-' + id).innerHTML =
        `<div class="err">Não foi possível carregar os dados.<br><br>Detalhe: ${e.message}</div>`;
    });
    document.getElementById('sync-label').textContent = '❌ Erro na sincronização';
  }
}

carregarDados();
</script>
</body>
</html>

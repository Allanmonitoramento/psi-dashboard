<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSI — Painel de Acordos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f5f5f3;color:#1a1a18;padding:16px;}
.dash{max-width:1100px;margin:0 auto;}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;background:#fff;border-radius:12px;padding:1rem 1.25rem;border:1px solid #e1e0d9;}
.header h1{font-size:17px;font-weight:700;color:#1a1a18;}
.header p{font-size:12px;color:#888780;margin-top:2px;}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;background:#e6f1fb;color:#185fa5;white-space:nowrap;}
.btn{font-size:12px;padding:6px 14px;border:1px solid #c3c2b7;border-radius:6px;background:#fff;cursor:pointer;font-family:Arial,sans-serif;color:#444;}
.btn:hover{background:#f5f5f3;}
.sync-row{font-size:12px;color:#888780;margin-bottom:1rem;}
.tabs{display:flex;gap:2px;margin-bottom:1.25rem;border-bottom:1px solid #e1e0d9;flex-wrap:wrap;}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;color:#888780;border:none;border-bottom:2px solid transparent;background:none;font-family:Arial,sans-serif;}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18;font-weight:700;}
.panel{display:none;}.panel.active{display:block;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem;}
.kpi{background:#fff;border-radius:8px;padding:.875rem 1rem;border:1px solid #e1e0d9;}
.kpi-label{font-size:11px;color:#888780;margin-bottom:5px;}
.kpi-value{font-size:22px;font-weight:700;color:#1a1a18;line-height:1.1;}
.kpi-sub{font-size:11px;color:#52514e;margin-top:3px;}
.card{background:#fff;border-radius:12px;padding:1rem 1.25rem;border:1px solid #e1e0d9;margin-bottom:1.25rem;}
.sec{font-size:11px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}
.filtros{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
.filtros label{font-size:12px;color:#888780;font-weight:600;}
.filtros select{font-size:12px;padding:5px 10px;border:1px solid #c3c2b7;border-radius:6px;background:#fff;color:#1a1a18;font-family:Arial,sans-serif;cursor:pointer;}
.acordo-card{background:#fff;border:1px solid #e1e0d9;border-radius:10px;padding:.875rem 1rem;margin-bottom:8px;border-left:4px solid #e1e0d9;}
.acordo-card.concluido{border-left-color:#3b6d11;}
.acordo-card.andamento{border-left-color:#eda100;}
.acordo-card.nao-iniciado{border-left-color:#888780;}
.acordo-card.atrasado{border-left-color:#e34948;}
.acordo-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
.acordo-titulo{font-size:13px;font-weight:600;color:#1a1a18;line-height:1.4;flex:1;}
.pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.pill-g{background:#eaf3de;color:#3b6d11;}
.pill-a{background:#faeeda;color:#854f0b;}
.pill-r{background:#fcebeb;color:#a32d2d;}
.pill-c{background:#f1efe8;color:#52514e;}
.pill-b{background:#e6f1fb;color:#185fa5;}
.acordo-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:#888780;margin-top:4px;}
.acordo-obs{font-size:11px;color:#52514e;margin-top:6px;padding-top:6px;border-top:1px solid #f1efe8;line-height:1.5;}
.bar-row{margin-bottom:9px;}
.bar-hd{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
.bar-track{width:100%;height:6px;background:#f1efe8;border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.loading{text-align:center;padding:2rem;color:#888780;font-size:13px;}
.err{padding:1.5rem;color:#a32d2d;font-size:13px;background:#fcebeb;border-radius:8px;line-height:1.6;}
.miss-sep{font-size:13px;font-weight:700;color:#1a1a18;margin:1rem 0 .5rem;padding:.5rem .75rem;background:#f5f5f3;border-radius:6px;border-left:3px solid #2a78d6;}
</style>
</head>
<body>
<div class="dash">
  <div class="header">
    <div>
      <h1>PSI — Painel de Acordos com BID/FIDA</h1>
      <p>BR-L1542 · Missões 2025 e 2026 · Revisão de Carteira</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span class="badge">Monitoramento de acordos</span>
      <button class="btn" onclick="carregarDados()">↻ Atualizar</button>
    </div>
  </div>

  <div class="sync-row" id="sync-label">⏳ Carregando dados...</div>

  <div class="tabs">
    <button class="tab active" onclick="aba('geral',this)">📊 Visão geral</button>
    <button class="tab" onclick="aba('missao25',this)">📋 Missão 2025</button>
    <button class="tab" onclick="aba('missao26',this)">📋 Missão 2026</button>
    <button class="tab" onclick="aba('carteira',this)">🏦 Revisão de Carteira</button>
  </div>

  <div id="panel-geral" class="panel active"><div class="loading">Carregando...</div></div>
  <div id="panel-missao25" class="panel"><div class="loading">Carregando...</div></div>
  <div id="panel-missao26" class="panel"><div class="loading">Carregando...</div></div>
  <div id="panel-carteira" class="panel"><div class="loading">Carregando...</div></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzmvpsrr1EMiorX8GTz8N6R_m_e3nEpW4hvMoV6jBL8YT0lMhcZX_M-s9sgDcujiTcYjQ/exec';

let dadosTodos = { m25: [], m26: [], rc: [] };

function aba(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  el.classList.add('active');
}

function normStatus(s) {
  s = String(s || '').toLowerCase().trim();
  if (s.includes('conclu')) return 'concluido';
  if (s.includes('andamento') || s.includes('execu') || s.includes('iniciado') && !s.includes('não') && !s.includes('nao')) return 'andamento';
  if (s.includes('atraso') || s.includes('atrasado')) return 'atrasado';
  if (s.includes('não inici') || s.includes('nao inici')) return 'nao-iniciado';
  if (s.includes('inicia') && !s.includes('não') && !s.includes('nao')) return 'andamento';
  return 'nao-iniciado';
}

function statusPill(s) {
  const n = normStatus(s);
  if (n === 'concluido') return '<span class="pill pill-g">✓ Concluído</span>';
  if (n === 'andamento') return '<span class="pill pill-a">⟳ Em andamento</span>';
  if (n === 'atrasado') return '<span class="pill pill-r">⚠ Atrasado</span>';
  return '<span class="pill pill-c">— Não iniciado</span>';
}

function contarStatus(arr) {
  const c = { concluido: 0, andamento: 0, atrasado: 0, 'nao-iniciado': 0 };
  arr.forEach(a => { const n = normStatus(a.status); c[n] = (c[n] || 0) + 1; });
  return c;
}

function excelDate(v) {
  if (!v) return '—';
  if (typeof v === 'string' && v.includes('/')) return v;
  const n = parseFloat(v);
  if (isNaN(n)) return String(v);
  const d = new Date((n - 25569) * 86400 * 1000);
  return d.toLocaleDateString('pt-BR');
}

function parseMissao25(rows) {
  const acordos = [];
  let missaoAtual = '';
  let cabecalhoIdx = -1;

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const c0 = String(r[0] || '').trim();
    const c1 = String(r[1] || '').trim();

    if (c1.toUpperCase().includes('MISSÃO') || c1.toUpperCase().includes('ACORDOS DE MISSÃO')) {
      missaoAtual = c1;
      continue;
    }
    if (c0 === 'Nº' || c0 === 'N°') { cabecalhoIdx = i; continue; }

    const num = parseFloat(c0);
    if (!isNaN(num) && num > 0 && c1) {
      acordos.push({
        num: c0,
        missao: missaoAtual,
        acao: c1,
        responsavel: String(r[2] || ''),
        prazo: excelDate(r[3]),
        status: String(r[4] || ''),
        obs: String(r[5] || '')
      });
    }
  }
  return acordos;
}

function parseMissao26(rows) {
  const acordos = [];
  let cabecalho = false;

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const c0 = String(r[0] || '').trim();

    if (c0 === 'ACORDOS DE MISSÃO 2026.1' || String(r[1] || '').toUpperCase() === 'ÓRGÃO') {
      cabecalho = true; continue;
    }
    if (!cabecalho) continue;
    if (!c0 || c0.toUpperCase().includes('ATAULIZADO') || c0.toUpperCase().includes('ATUALIZADO')) continue;

    if (c0.length > 10) {
      acordos.push({
        acao: c0,
        orgao: String(r[1] || ''),
        setor: String(r[2] || ''),
        responsavel: String(r[3] || ''),
        inicio: excelDate(r[4]),
        prazo: excelDate(r[5]),
        status: String(r[6] || ''),
        obs: String(r[7] || '')
      });
    }
  }
  return acordos;
}

function parseCarteira(rows) {
  const acordos = [];
  let cabecalho = false;

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const c0 = String(r[0] || '').trim();
    const c1 = String(r[1] || '').trim();

    if (c1.toUpperCase() === 'ACORDO' || c1 === 'ACORDO') { cabecalho = true; continue; }
    if (!cabecalho) continue;

    const num = parseFloat(c0);
    if (!isNaN(num) && num > 0 && c1) {
      acordos.push({
        num: c0,
        acordo: c1,
        indicador: String(r[2] || ''),
        prazo: String(r[3] || ''),
        status: String(r[4] || '')
      });
    }
  }
  return acordos;
}

function barrasStatus(contagem, total) {
  const items = [
    { label: 'Concluído', key: 'concluido', cor: '#3b6d11' },
    { label: 'Em andamento', key: 'andamento', cor: '#eda100' },
    { label: 'Atrasado', key: 'atrasado', cor: '#e34948' },
    { label: 'Não iniciado', key: 'nao-iniciado', cor: '#c3c2b7' },
  ];
  return items.map(it => {
    const v = contagem[it.key] || 0;
    const p = total > 0 ? (v / total * 100).toFixed(0) : 0;
    return `<div class="bar-row">
      <div class="bar-hd"><span>${it.label}</span><span style="color:#888780;">${v} (${p}%)</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${it.cor};"></div></div>
    </div>`;
  }).join('');
}

function renderGeral() {
  const { m25, m26, rc } = dadosTodos;
  const todos = [...m25, ...m26, ...rc];
  const c25 = contarStatus(m25);
  const c26 = contarStatus(m26);
  const crc = contarStatus(rc);
  const ctot = contarStatus(todos);

  document.getElementById('panel-geral').innerHTML = `
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Total de acordos</div><div class="kpi-value">${todos.length}</div><div class="kpi-sub">3 missões/revisões</div></div>
      <div class="kpi"><div class="kpi-label">Concluídos</div><div class="kpi-value" style="color:#3b6d11;">${ctot.concluido||0}</div><div class="kpi-sub">${(((ctot.concluido||0)/todos.length)*100).toFixed(0)}% do total</div></div>
      <div class="kpi"><div class="kpi-label">Em andamento</div><div class="kpi-value" style="color:#854f0b;">${ctot.andamento||0}</div></div>
      <div class="kpi"><div class="kpi-label">Atrasados</div><div class="kpi-value" style="color:#a32d2d;">${ctot.atrasado||0}</div></div>
      <div class="kpi"><div class="kpi-label">Não iniciados</div><div class="kpi-value" style="color:#888780;">${ctot['nao-iniciado']||0}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;">
      <div class="card">
        <p class="sec">Missão 2025 — ${m25.length} acordos</p>
        ${barrasStatus(c25, m25.length)}
      </div>
      <div class="card">
        <p class="sec">Missão 2026 — ${m26.length} acordos</p>
        ${barrasStatus(c26, m26.length)}
      </div>
      <div class="card">
        <p class="sec">Revisão de Carteira — ${rc.length} acordos</p>
        ${barrasStatus(crc, rc.length)}
      </div>
    </div>
    <div class="card" style="margin-top:0;">
      <p class="sec">Visão consolidada</p>
      ${barrasStatus(ctot, todos.length)}
    </div>
  `;
}

function renderAcordos25(filtroStatus = 'todos', filtroResp = 'todos') {
  const { m25 } = dadosTodos;
  const responsaveis = [...new Set(m25.map(a => a.responsavel).filter(Boolean))].sort();
  const missoes = [...new Set(m25.map(a => a.missao).filter(Boolean))];

  let filtrados = m25;
  if (filtroStatus !== 'todos') filtrados = filtrados.filter(a => normStatus(a.status) === filtroStatus);
  if (filtroResp !== 'todos') filtrados = filtrados.filter(a => a.responsavel === filtroResp);

  const cards = filtrados.map(a => {
    const ns = normStatus(a.status);
    return `<div class="acordo-card ${ns}">
      <div class="acordo-top">
        <div class="acordo-titulo">${a.num ? `<span style="color:#888780;font-size:11px;">#${a.num}</span> ` : ''}${a.acao}</div>
        ${statusPill(a.status)}
      </div>
      <div class="acordo-meta">
        <span>📌 ${a.responsavel || '—'}</span>
        <span>📅 Prazo: ${a.prazo}</span>
        ${a.missao ? `<span class="pill pill-b">${a.missao}</span>` : ''}
      </div>
      ${a.obs && a.obs.trim() ? `<div class="acordo-obs">💬 ${a.obs}</div>` : ''}
    </div>`;
  }).join('') || '<div class="loading">Nenhum acordo encontrado com esse filtro.</div>';

  document.getElementById('panel-missao25').innerHTML = `
    <div class="filtros">
      <label>Status:</label>
      <select onchange="renderAcordos25(this.value, document.getElementById('resp25').value)">
        <option value="todos">Todos</option>
        <option value="concluido" ${filtroStatus==='concluido'?'selected':''}>Concluído</option>
        <option value="andamento" ${filtroStatus==='andamento'?'selected':''}>Em andamento</option>
        <option value="atrasado" ${filtroStatus==='atrasado'?'selected':''}>Atrasado</option>
        <option value="nao-iniciado" ${filtroStatus==='nao-iniciado'?'selected':''}>Não iniciado</option>
      </select>
      <label>Responsável:</label>
      <select id="resp25" onchange="renderAcordos25(document.querySelector('#panel-missao25 select').value, this.value)">
        <option value="todos">Todos</option>
        ${responsaveis.map(r => `<option value="${r}" ${filtroResp===r?'selected':''}>${r}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:#888780;">${filtrados.length} acordos</span>
    </div>
    ${cards}
  `;
}

function renderAcordos26(filtroStatus = 'todos', filtroResp = 'todos', filtroOrgao = 'todos') {
  const { m26 } = dadosTodos;
  const responsaveis = [...new Set(m26.map(a => a.responsavel).filter(Boolean))].sort();
  const orgaos = [...new Set(m26.map(a => a.orgao).filter(Boolean))].sort();

  let filtrados = m26;
  if (filtroStatus !== 'todos') filtrados = filtrados.filter(a => normStatus(a.status) === filtroStatus);
  if (filtroResp !== 'todos') filtrados = filtrados.filter(a => a.responsavel === filtroResp);
  if (filtroOrgao !== 'todos') filtrados = filtrados.filter(a => a.orgao === filtroOrgao);

  const cards = filtrados.map(a => {
    const ns = normStatus(a.status);
    return `<div class="acordo-card ${ns}">
      <div class="acordo-top">
        <div class="acordo-titulo">${a.acao}</div>
        ${statusPill(a.status)}
      </div>
      <div class="acordo-meta">
        <span>🏛 ${a.orgao || '—'}</span>
        <span>👤 ${a.responsavel || '—'}</span>
        <span>📂 ${a.setor || '—'}</span>
        <span>📅 Prazo: ${a.prazo}</span>
      </div>
      ${a.obs && a.obs.trim() ? `<div class="acordo-obs">💬 ${a.obs}</div>` : ''}
    </div>`;
  }).join('') || '<div class="loading">Nenhum acordo encontrado com esse filtro.</div>';

  document.getElementById('panel-missao26').innerHTML = `
    <div class="filtros">
      <label>Status:</label>
      <select onchange="renderAcordos26(this.value, document.getElementById('resp26').value, document.getElementById('org26').value)">
        <option value="todos">Todos</option>
        <option value="concluido" ${filtroStatus==='concluido'?'selected':''}>Concluído</option>
        <option value="andamento" ${filtroStatus==='andamento'?'selected':''}>Em andamento</option>
        <option value="atrasado" ${filtroStatus==='atrasado'?'selected':''}>Atrasado</option>
        <option value="nao-iniciado" ${filtroStatus==='nao-iniciado'?'selected':''}>Não iniciado</option>
      </select>
      <label>Órgão:</label>
      <select id="org26" onchange="renderAcordos26(document.querySelector('#panel-missao26 select').value, document.getElementById('resp26').value, this.value)">
        <option value="todos">Todos</option>
        ${orgaos.map(o => `<option value="${o}" ${filtroOrgao===o?'selected':''}>${o}</option>`).join('')}
      </select>
      <label>Responsável:</label>
      <select id="resp26" onchange="renderAcordos26(document.querySelector('#panel-missao26 select').value, this.value, document.getElementById('org26').value)">
        <option value="todos">Todos</option>
        ${responsaveis.map(r => `<option value="${r}" ${filtroResp===r?'selected':''}>${r}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:#888780;">${filtrados.length} acordos</span>
    </div>
    ${cards}
  `;
}

function renderCarteira() {
  const { rc } = dadosTodos;
  const cards = rc.map(a => {
    const ns = normStatus(a.status);
    return `<div class="acordo-card ${ns}">
      <div class="acordo-top">
        <div class="acordo-titulo">${a.num ? `<span style="color:#888780;font-size:11px;">#${a.num}</span> ` : ''}${a.acordo}</div>
        ${statusPill(a.status)}
      </div>
      <div class="acordo-meta">
        <span>📅 Prazo: ${a.prazo}</span>
        ${a.indicador ? `<span>📊 ${a.indicador}</span>` : ''}
      </div>
    </div>`;
  }).join('') || '<div class="loading">Nenhum acordo encontrado.</div>';

  document.getElementById('panel-carteira').innerHTML = `
    <div style="font-size:12px;color:#888780;margin-bottom:12px;">${rc.length} acordos da Revisão de Carteira BID 2026.1</div>
    ${cards}
  `;
}

async function carregarDados() {
  document.getElementById('sync-label').textContent = '⏳ Carregando dados...';
  ['geral','missao25','missao26','carteira'].forEach(id => {
    document.getElementById('panel-' + id).innerHTML = '<div class="loading">Carregando...</div>';
  });
  try {
    const r = await fetch(API);
    if (!r.ok) throw new Error(`Erro HTTP ${r.status}`);
    const dados = await r.json();

    dadosTodos.m25 = parseMissao25(dados['ACORDOS MISSÃO 2025'] || []);
    dadosTodos.m26 = parseMissao26(dados['ACORDOS MISSÃO 2026'] || []);
    dadosTodos.rc = parseCarteira(dados['ACORDOS REVISÃO DE CARTEIRA'] || []);

    renderGeral();
    renderAcordos25();
    renderAcordos26();
    renderCarteira();

    const now = new Date();
    document.getElementById('sync-label').innerHTML =
      `✅ Sincronizado às ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} de ${now.toLocaleDateString('pt-BR')}`;
  } catch(e) {
    ['geral','missao25','missao26','carteira'].forEach(id => {
      document.getElementById('panel-'+id).innerHTML =
        `<div class="err">Não foi possível carregar os dados.<br><br>Detalhe: ${e.message}</div>`;
    });
    document.getElementById('sync-label').textContent = '❌ Erro na sincronização';
  }
}

carregarDados();
</script>
</body>
</html>
